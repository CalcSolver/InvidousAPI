<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>iPad Invidious Streamer</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            color: #f1c40f;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 20px;
        }
        input {
            width: 85%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 2px solid #333;
            background: #2b2b2b;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: #f1c40f;
        }
        button {
            padding: 12px 28px;
            background: #f1c40f;
            color: #111;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #d4ac0d;
        }
        .player-frame {
            margin-top: 25px;
            display: none;
            position: relative;
            padding-bottom: 56.25%; /* Perfect 16:9 ratio */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
        }
        .player-frame iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Legacy Hub</h1>
    <p class="subtitle">Custom structural pipeline utilizing unblocked Invidious mirrors.</p>
    
    <input type="text" id="videoUrl" placeholder="Paste YouTube link here...">
    <br>
    <button onclick="streamViaInvidious()">Launch Video</button>

    <div class="player-frame" id="playerWrapper">
        </div>
</div>

<script>
    function extractVideoId(url) {
        var regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        var match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function streamViaInvidious() {
        var urlInput = document.getElementById('videoUrl').value.trim();
        var videoId = extractVideoId(urlInput);
        var wrapper = document.getElementById('playerWrapper');

        if (!videoId) {
            alert('Please check your link and try again.');
            return;
        }

        // We target a highly stable public Invidious instance node
        var activeInstance = "https://inv.tux.digital";

        // Building a clean, legacy-ready tracking-free embed string
        // &local=true forces the instance to proxy the media so your iPad can read it
        var targetEmbed = activeInstance + "/embed/" + videoId + "?autoplay=1&local=true&player_style=youtube";

        // Render the window
        wrapper.innerHTML = '<iframe src="' + targetEmbed + '" allowfullscreen></iframe>';
        wrapper.style.display = 'block';
    }
</script>

</body>
</html>
