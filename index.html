<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Legacy iPad Streamer</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #222;
            padding: 20px;
            border-radius: 8px;
        }
        h1 {
            color: #ff4757;
            font-size: 24px;
        }
        input {
            width: 80%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #333;
            color: #fff;
            font-size: 16px;
        }
        button {
            padding: 12px 24px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .player-container {
            margin-top: 20px;
            display: none;
        }
        /* Uses standard dimensions perfect for older mobile Safari engines */
        iframe {
            width: 100%;
            height: 360px;
            border: none;
            background: #000;
            border-radius: 4px;
        }
        .status {
            margin: 10px 0;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Legacy iPad Video Player</h1>
    <p class="status">Bypasses app constraints for older iOS versions.</p>
    
    <input type="text" id="videoUrl" placeholder="Paste YouTube link here...">
    <br>
    <button onclick="loadLegacyStream()">Load Video</button>

    <div class="player-container" id="playerContainer">
        </div>
</div>

<script>
    function extractVideoId(url) {
        var regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        var match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function loadLegacyStream() {
        var urlInput = document.getElementById('videoUrl').value.trim();
        var videoId = extractVideoId(urlInput);
        var container = document.getElementById('playerContainer');

        if (!videoId) {
            alert('Please enter a valid YouTube link.');
            return;
        }

        // We use a privacy-respecting, lightweight embed instance.
        // This strips away all modern heavy scripts that crash old Safari engines.
        var embedUrl = "https://youtube.com/embed/" + videoId + "?autoplay=1&playsinline=1";

        // Injecting the player explicitly via clean innerHTML string parsing
        container.innerHTML = '<iframe src="' + embedUrl + '" allowfullscreen defer></iframe>';
        container.style.display = 'block';
    }
</script>

</body>
</html>
