<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>iPad Legacy Video Portal</title>
    <style>
        body {
            background-color: #0c0d10;
            color: #ffffff;
            font-family: -apple-system, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 550px;
            margin: 30px auto;
            background: #171921;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            border: 1px solid #252836;
        }
        h1 {
            color: #f1c40f;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .tagline {
            color: #a4a9be;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .node-status {
            background: #252836;
            color: #00ff88;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            display: inline-block;
            margin-bottom: 20px;
            font-family: monospace;
        }
        input {
            width: 90%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 2px solid #252836;
            background: #1f222f;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        .btn-panel {
            margin-top: 10px;
        }
        .action-btn {
            display: inline-block;
            padding: 14px 24px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-launch { 
            background: #f1c40f; 
            color: #111; 
        }
        .btn-rotate { 
            background: #34495e; 
            color: #fff; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>iPad Video Launcher</h1>
    <p class="tagline">Bypasses frame restrictions to play YouTube videos on older iOS devices.</p>
    
    <div class="node-status" id="nodeLabel">Server Channel: yewtu.be</div>
    
    <br>
    <input type="text" id="videoUrl" placeholder="Paste YouTube link here...">
    
    <div class="btn-panel">
        <a id="launchLink" class="action-btn btn-launch" href="#" target="_blank" onclick="return validateAndBuildUrl()">Launch Video Player</a>
        <button class="action-btn btn-rotate" onclick="changeServer()">Cycle Server Route</button>
    </div>
</div>

<script>
    // Public instances curated specifically for legacy compatibility
    var proxyNodes = [
        "https://yewtu.be",
        "https://inv.nadeko.net",
        "https://invidious.nerdvpn.de",
        "https://invidious.flokinet.to"
    ];
    
    var currentRouteIndex = 0;

    function changeServer() {
        currentRouteIndex = (currentRouteIndex + 1) % proxyNodes.length;
        var displayUrl = proxyNodes[currentRouteIndex].replace("https://", "");
        document.getElementById("nodeLabel").innerText = "Server Channel: " + displayUrl;
    }

    function extractVideoId(url) {
        var regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        var match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function validateAndBuildUrl() {
        var inputVal = document.getElementById("videoUrl").value.trim();
        var id = extractVideoId(inputVal);
        var launchLink = document.getElementById("launchLink");

        if (!id) {
            alert("Please input a valid YouTube link format.");
            return false; // Blocks the link from opening an empty window
        }

        var selectedBase = proxyNodes[currentRouteIndex];
        
        // We open the native watch page directly. 
        // &local=true proxies the video stream so the older iPad engine doesn't talk to Google servers.
        // &preferences=... turns off modern web UI layers to prevent older Safari engines from lagging.
        var absoluteWatchUrl = selectedBase + "/watch?v=" + id + "&local=true&dark_mode=true&player_style=youtube";
        
        launchLink.href = absoluteWatchUrl;
        return true; // Allows standard link execution to open a fresh tab
    }
</script>

</body>
</html>
