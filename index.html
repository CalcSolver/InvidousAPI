<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Native Stream Engine</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #0d0e12; color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 750px; width: 100%; background: #16171e; padding: 30px; border-radius: 16px; box-shadow: 0 12px 32px rgba(0,0,0,0.6); border: 1px solid #232530; }
        h1 { text-align: center; margin-bottom: 24px; color: #ff4757; font-weight: 700; }
        .input-group { display: flex; gap: 12px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 14px; border: 2px solid #2d303f; border-radius: 8px; background: #1f212a; color: #fff; font-size: 16px; outline: none; transition: border-color 0.2s; }
        input[type="text"]:focus { border-color: #ff4757; }
        button { padding: 14px 28px; background: #ff4757; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .status { text-align: center; color: #a4a9be; margin-bottom: 15px; font-size: 14px; min-height: 20px; }
        .media-zone { display: none; margin-top: 10px; text-align: center; }
        video { width: 100%; max-height: 420px; border-radius: 12px; background: #000; box-shadow: 0 8px 20px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .download-btn { display: inline-block; padding: 12px 24px; background: #2ed573; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; transition: background 0.2s; }
        .download-btn:hover { background: #26af5f; }
    </style>
</head>
<body>

<div class="container">
    <h1>Serverless Stream Hub</h1>
    <div class="input-group">
        <input type="text" id="videoUrl" placeholder="Paste YouTube link here...">
        <button onclick="requestServerlessStream()">Stream Video</button>
    </div>

    <div class="status" id="statusText">Ready to extract clean stream files.</div>

    <div class="media-zone" id="mediaZone">
        <video id="nativePlayer" controls crossorigin="anonymous"></video>
        <br>
        <a id="downloadLink" class="download-btn" href="#" target="_blank" download="video.mp4">Save Video File (.mp4)</a>
    </div>
</div>

<script>
    async function requestServerlessStream() {
        const urlInput = document.getElementById('videoUrl').value.trim();
        const statusText = document.getElementById('statusText');
        const mediaZone = document.getElementById('mediaZone');
        const player = document.getElementById('nativePlayer');
        const downloadLink = document.getElementById('downloadLink');

        if (!urlInput) {
            alert('Please enter a link.');
            return;
        }

        statusText.innerText = "Routing request through Vercel Serverless Function...";
        mediaZone.style.display = "none";
        player.src = "";

        try {
            // Fetch dynamically from your own backend API relative route
            const response = await fetch('/api/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput })
            });

            const data = await response.json();

            if (response.ok && data.url) {
                statusText.innerText = "Success! Source stream extracted cleanly.";
                player.src = data.url;
                downloadLink.href = data.url;
                mediaZone.style.display = "block";
                player.load();
            } else {
                statusText.innerText = data.error || "Failed to process link on the serverless cluster.";
            }
        } catch (error) {
            console.error(error);
            statusText.innerText = "Internal gateway error. Ensure this project is running live on Vercel deployment infrastructure.";
        }
    }
</script>

</body>
</html>
